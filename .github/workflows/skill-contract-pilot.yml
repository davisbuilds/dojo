name: Skill Contract Strict Set

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'docs/system/skill-contract-v1.md'
      - 'requirements.txt'
      - '.github/workflows/skill-contract-pilot.yml'
  push:
    branches:
      - main
    paths:
      - 'skills/**'
      - 'docs/system/skill-contract-v1.md'
      - 'requirements.txt'
      - '.github/workflows/skill-contract-pilot.yml'

jobs:
  validate-pilot:
    name: Validate Strict Skill Set
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run strict contract checks on enforced skill set
        run: |
          python3 skills/skill-evals/scripts/validate_skill_contract.py \
            --skills-root skills \
            --skills secure-code,audit-skill,gh-fix-issue,vercel-deploy,vercel-preview-logs,deep-research,hookify,skill-creator,writing-plans,playwright,gh-review-pr,gh-triage-issues,code-review-agents \
            --strict \
            --json > strict-skill-contract-report.json

      - name: Upload strict set report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strict-skill-contract-report
          path: strict-skill-contract-report.json
