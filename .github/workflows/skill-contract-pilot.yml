name: Skill Contract Strict Set

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'docs/system/skill-contract-v1.md'
      - 'requirements.txt'
      - 'requirements.lock'
      - '.github/workflows/skill-contract-pilot.yml'
  push:
    branches:
      - main
    paths:
      - 'skills/**'
      - 'docs/system/skill-contract-v1.md'
      - 'requirements.txt'
      - 'requirements.lock'
      - '.github/workflows/skill-contract-pilot.yml'

permissions:
  contents: read

jobs:
  validate-pilot:
    name: Validate Strict Skill Set
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements.lock

      - name: Run strict contract checks on enforced skill set
        run: |
          . .venv/bin/activate
          python3 skills/skill-evals/scripts/validate_skill_contract.py \
            --skills-root skills \
            --strict \
            --json > strict-skill-contract-report.json

      - name: Upload strict set report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: strict-skill-contract-report
          path: strict-skill-contract-report.json
